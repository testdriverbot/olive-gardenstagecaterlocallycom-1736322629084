version: 4.1.33
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Click on a product's "+" button to add it to the cart.
    commands:
      - command: hover-text
        text: +
        description: plus button next to a product to add it to the cart
        action: click
  - prompt: Assert that the item is added to the cart successfully.
    commands:
      - command: assert
        expect: the cart is not empty
