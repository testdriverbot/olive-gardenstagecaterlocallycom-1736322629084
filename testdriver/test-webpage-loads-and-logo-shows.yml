version: 4.1.33
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Assert that the webpage loads successfully.
    commands:
      - command: assert
        expect: Olive Garden is visible on the webpage
  - prompt: >-
      Assert that the Olive Garden logo is visible.  # Use the content of the
      file from the environment
    commands:
      - command: assert
        expect: Olive Garden logo is visible on the webpage
  - prompt: >-
      Assert that the Olive Garden logo is visible.  # Use the content of the
      file from the environment
    commands:
      - command: assert
        expect: Olive Garden logo is visible on the webpage
